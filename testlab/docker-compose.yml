name: noc-testlab

# Lab de teste: ferramentas de monitoramento apontando para o seu NOC/SOC.
# Fluxo: preencha .env → rode setup.ps1 (ou setup.sh) → docker compose up -d
# Os arquivos em ./rendered são gerados pelo setup (com o token) e montados aqui.

services:
  # ---- Prometheus + Alertmanager: dispara sozinho, prova a conexão em ~1 min ----
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    volumes:
      - ./rendered/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./rendered/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    ports:
      - "9090:9090"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    volumes:
      - ./rendered/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"

  # ---- Grafana: contact point já provisionado; basta clicar "Test" ----
  grafana:
    image: grafana/grafana-oss:11.2.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./rendered/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"

  # ---- Uptime Kuma: monitora sites/portas; notificação Webhook (config na UI) ----
  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - kuma-data:/app/data
    ports:
      - "3001:3001"

  # ---- Gerador de problemas: fica no ar 90s, cai 45s, repete. Alvo realista ----
  # (o Prometheus sonda via blackbox e dispara EndpointDown sozinho; o Uptime Kuma
  #  também pode monitorar http://flaky-target:8080).
  flaky-target:
    image: python:3.12-alpine
    restart: unless-stopped
    command:
      - sh
      - -c
      - "while true; do echo UP; timeout 90 python3 -m http.server 8080 || true; echo DOWN; sleep 45; done"

  # ---- Blackbox exporter: o Prometheus usa ele para "pingar" URLs/portas ----
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    restart: unless-stopped

  # ================= Zabbix (opcional) =================
  # Mais pesado (sobe em ~2-3 min). Só inicia com:  docker compose --profile zabbix up -d
  zabbix-db:
    image: postgres:16-alpine
    profiles: ["zabbix"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix
      POSTGRES_DB: zabbix
    volumes:
      - zabbix-db:/var/lib/postgresql/data

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-6.4-latest
    profiles: ["zabbix"]
    restart: unless-stopped
    environment:
      DB_SERVER_HOST: zabbix-db
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix
      POSTGRES_DB: zabbix
    depends_on:
      - zabbix-db
    ports:
      - "10051:10051"

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-6.4-latest
    profiles: ["zabbix"]
    restart: unless-stopped
    environment:
      ZBX_SERVER_HOST: zabbix-server
      DB_SERVER_HOST: zabbix-db
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix
      POSTGRES_DB: zabbix
      PHP_TZ: America/Sao_Paulo
    depends_on:
      - zabbix-server
    ports:
      - "8080:8080"

  zabbix-agent:
    image: zabbix/zabbix-agent:alpine-6.4-latest
    profiles: ["zabbix"]
    restart: unless-stopped
    environment:
      ZBX_HOSTNAME: Zabbix server
      ZBX_SERVER_HOST: zabbix-server
    depends_on:
      - zabbix-server

volumes:
  grafana-data:
  kuma-data:
  zabbix-db:
