global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'noc-soc-webhook'

receivers:
  - name: 'noc-soc-webhook'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/api/v1/ingest/prometheus'
        send_resolved: true
        http_config:
          headers:
            X-API-Key: "tenant-api-key-here"
